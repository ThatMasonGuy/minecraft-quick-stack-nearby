tasks.register('buildAllVersions') {
	group = 'build'
	description = 'Builds every supported Minecraft version profile.'
	if (supportedProfileBuildTasks.isEmpty()) {
		dependsOn tasks.named('buildAllMods')
		doFirst {
			println 'No supported Minecraft version profiles are configured; building the active profile only.'
		}
	} else {
		dependsOn supportedProfileBuildTasks
	}
}

tasks.register('buildValidationVersions') {
	group = 'verification'
	description = 'Builds every supported and candidate Minecraft version profile.'
	dependsOn validationProfileBuildTasks

	doFirst {
		println "Validation profiles: ${validationMinecraftVersionProfiles.join(', ')}"
	}
}

tasks.register('listVersionProfiles') {
	group = 'help'
	description = 'Lists supported and candidate Minecraft version profiles.'

	doLast {
		println "Active profile: ${minecraft_version_profile}"
		println "Supported profiles: ${supportedMinecraftVersionProfiles.join(', ')}"
		println "Candidate profiles: ${candidateMinecraftVersionProfiles.join(', ')}"
		candidateMinecraftVersionProfiles.each { profileName ->
			def profile = loadVersionProfile(profileName)
			println "  - ${profileName}: profile_id=${profile.getProperty('profile_id', profileName)}, compat_group=${profile.getProperty('compat_group', profileName)}, minecraft=${profile.getProperty('minecraft_version')}"
		}
	}
}

tasks.register('verifySmokeTestMatrix') {
	group = 'verification'
	description = 'Verifies supported profiles have passing smoke-test records and candidate profiles are tracked.'

	doLast {
		def smokeFile = file('gradle/smoke-tests.json')
		if (!smokeFile.isFile()) {
			throw new GradleException("Missing smoke-test matrix: ${smokeFile}")
		}

		def smokeMatrix = new groovy.json.JsonSlurper().parse(smokeFile)
		if (smokeMatrix.schema_version != 1) {
			throw new GradleException("Unsupported smoke-test matrix schema: ${smokeMatrix.schema_version}")
		}
		def profilesNode = smokeMatrix.profiles ?: [:]
		def validStatuses = ['pass', 'pending', 'fail'] as Set

		smokeTestRequiredMinecraftVersionProfiles.each { profileName ->
			def profile = loadVersionProfile(profileName)
			def profileId = profileIdFor(profileName, profile)
			def smokeProfile = profilesNode[profileId]
			if (!smokeProfile) {
				throw new GradleException("Smoke-test matrix is missing required profile '${profileId}'.")
			}

			profileGameVersionsFor(profile).each { gameVersion ->
				def result = smokeProfile.game_versions ? smokeProfile.game_versions[gameVersion] : null
				if (!result) {
					throw new GradleException("Smoke-test matrix is missing required ${profileId} / ${gameVersion}.")
				}
				if (!validStatuses.contains(result.status)) {
					throw new GradleException("Smoke-test matrix has invalid status '${result.status}' for ${profileId} / ${gameVersion}.")
				}
				if (result.status != 'pass') {
					throw new GradleException("Supported profile '${profileId}' cannot publish ${gameVersion}; smoke status is '${result.status}'.")
				}
				if (!result.tested_at || !result.method) {
					throw new GradleException("Passing smoke record for ${profileId} / ${gameVersion} must include tested_at and method.")
				}
			}
		}

		candidateMinecraftVersionProfiles.each { profileName ->
			def profile = loadVersionProfile(profileName)
			def profileId = profileIdFor(profileName, profile)
			def smokeProfile = profilesNode[profileId]
			if (!smokeProfile) {
				throw new GradleException("Smoke-test matrix is missing candidate profile '${profileId}'. Add pending records before CI validation.")
			}

			profileGameVersionsFor(profile).each { gameVersion ->
				def result = smokeProfile.game_versions ? smokeProfile.game_versions[gameVersion] : null
				if (!result) {
					throw new GradleException("Smoke-test matrix is missing candidate ${profileId} / ${gameVersion}. Add a pending/pass/fail record.")
				}
				if (!validStatuses.contains(result.status)) {
					throw new GradleException("Smoke-test matrix has invalid status '${result.status}' for ${profileId} / ${gameVersion}.")
				}
				if (result.status == 'pass' && (!result.tested_at || !result.method)) {
					throw new GradleException("Passing smoke record for ${profileId} / ${gameVersion} must include tested_at and method.")
				}
				if (result.status != 'pass') {
					println "Candidate profile '${profileId}' for Minecraft ${gameVersion} is tracked as '${result.status}' and remains non-publishable."
				}
			}
		}
	}
}

def smokeInstallSets = [
		[
				id         : 'quick-stack-nearby-client-only',
				taskSuffix : 'ClientOnly',
				kind       : 'client',
				launchTask : ':smokelaunch:runClient',
				requiresXvfb: true,
				passMarker : 'QUICKSTACKNEARBY_SMOKE_TEST_PASS',
				description: 'Quick Stack Nearby client jar only'
		],
		[
				id         : 'quick-stack-nearby-server-only',
				taskSuffix : 'ServerOnly',
				kind       : 'server',
				launchTask : ':smokelaunch:runServer',
				requiresXvfb: false,
				passMarker : 'QUICKSTACKNEARBY_SERVER_SMOKE_TEST_PASS',
				description: 'Quick Stack Nearby jar on a dedicated Fabric server'
		]
]
def clientSmokeInstallSets = smokeInstallSets.findAll { it.kind == 'client' }
def serverSmokeInstallSets = smokeInstallSets.findAll { it.kind == 'server' }

def selectedSmokeFiltersConfigured = !selectedSmokeProfileFilters.isEmpty()
		|| !selectedSmokeGameVersionFilters.isEmpty()
		|| !selectedSmokeInstallSetFilters.isEmpty()

def filteredSmokeProfiles = { List<String> profiles ->
	if (selectedSmokeProfileFilters.isEmpty()) {
		return profiles
	}
	return profiles.findAll { profileName ->
		def profile = loadVersionProfile(profileName)
		def profileId = profileIdFor(profileName, profile)
		selectedSmokeProfileFilters.contains(profileName) || selectedSmokeProfileFilters.contains(profileId)
	}
}

def filteredSmokeGameVersions = { Properties profile ->
	def gameVersions = profileGameVersionsFor(profile)
	if (selectedSmokeGameVersionFilters.isEmpty()) {
		return gameVersions
	}
	return gameVersions.findAll { selectedSmokeGameVersionFilters.contains(it) }
}

def filteredSmokeInstallSets = { List<Map> installSets ->
	if (selectedSmokeInstallSetFilters.isEmpty()) {
		return installSets
	}
	return installSets.findAll {
		selectedSmokeInstallSetFilters.contains(it.id) || selectedSmokeInstallSetFilters.contains(it.taskSuffix)
	}
}

def registerSmokeTasks = { List<String> profiles, String taskPrefix, String buildTaskPrefix, boolean applySelectionFilters, List<Map> installSets ->
	def smokeTasks = []
	def previousSmokeTask = null
	def profilesForSmoke = applySelectionFilters ? filteredSmokeProfiles(profiles) : profiles
	def installSetsForSmoke = applySelectionFilters ? filteredSmokeInstallSets(installSets) : installSets

	profilesForSmoke.each { profileName ->
		def profile = loadVersionProfile(profileName)
		def profileId = profileIdFor(profileName, profile)
		def releaseJarDirectory = layout.buildDirectory.dir("release/${profileId}")
		def buildTaskName = profileBuildTaskName(buildTaskPrefix, profileName)
		def gameVersionsForSmoke = applySelectionFilters ? filteredSmokeGameVersions(profile) : profileGameVersionsFor(profile)

		gameVersionsForSmoke.each { gameVersion ->
			installSetsForSmoke.each { installSet ->
				def taskName = "${taskPrefix}${safeTaskSuffix(profileName)}On${safeTaskSuffix(gameVersion)}${installSet.taskSuffix}"
				def modListFile = layout.buildDirectory.file("smoke-mod-lists/${profileId}/${gameVersion}/${installSet.id}.txt")
				def smokeLogFile = layout.buildDirectory.file("smoke-logs/${profileId}/${gameVersion}/${installSet.id}.log")
				def smokeOutput = new ByteArrayOutputStream()
				def runArguments = [
						gradleWrapperExecutable,
						installSet.launchTask,
						"-Pminecraft_version_profile=${gameVersion}",
						'-Pquickstacknearby_smoke_test=true',
						"-Pquickstacknearby_smoke_release_profile=${profileId}",
						"-Pquickstacknearby_smoke_install_set=${installSet.id}",
						"-Pquickstacknearby_smoke_mods=@${modListFile.get().asFile.absolutePath}"
				]
				if (useSmokeTestNestedNoDaemon) {
					runArguments.add('--no-daemon')
				}
				runArguments.add('--console=plain')

				def smokeTask = tasks.register(taskName, Exec) {
					group = 'verification'
					description = "Launches Minecraft ${gameVersion} with ${installSet.description} from profile ${profileId}."
					dependsOn tasks.named(buildTaskName)

					if (useSmokeTestXvfb && installSet.requiresXvfb) {
						commandLine((['xvfb-run', '-a'] + runArguments) as String[])
					} else {
						commandLine(runArguments as String[])
					}
					standardOutput = smokeOutput
					errorOutput = smokeOutput
					ignoreExitValue = true

					doFirst {
						def releaseDir = releaseJarDirectory.get().asFile
						def releaseJar = new File(releaseDir, "${project.base.archivesName.get()}-${version}.jar")
						if (!releaseJar.isFile()) {
							throw new GradleException("Smoke test ${taskName} is missing release jar: ${releaseJar}")
						}

						def modList = modListFile.get().asFile
						modList.parentFile.mkdirs()
						modList.text = releaseJar.absolutePath + System.lineSeparator()
					}

					doLast {
						def outputText = smokeOutput.toString('UTF-8')
						def logFile = smokeLogFile.get().asFile
						logFile.parentFile.mkdirs()
						logFile.text = outputText
						print outputText

						def exitValue = executionResult.get().exitValue
						if (exitValue != 0) {
							throw new GradleException("Smoke test ${taskName} failed with exit code ${exitValue}. Log: ${logFile}")
						}
						if (!outputText.contains(installSet.passMarker)) {
							throw new GradleException("Smoke test ${taskName} did not print ${installSet.passMarker}. Log: ${logFile}")
						}
					}
				}

				if (previousSmokeTask != null) {
					def predecessor = previousSmokeTask
					smokeTask.configure {
						mustRunAfter predecessor
					}
				}
				previousSmokeTask = smokeTask
				smokeTasks.add(smokeTask)
			}
		}
	}

	return smokeTasks
}

