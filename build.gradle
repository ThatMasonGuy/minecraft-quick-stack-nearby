def modrinthProperty = { String key, String defaultValue ->
	def value = findProperty(key)
	return value != null && !value.toString().isBlank() ? value.toString().trim() : defaultValue
}

def modrinthToken = {
	def propertyToken = findProperty('modrinth_token')
	if (propertyToken != null && !propertyToken.toString().isBlank()) {
		return propertyToken.toString().trim()
	}
	def envToken = System.getenv('MODRINTH_TOKEN')
	return envToken != null && !envToken.isBlank() ? envToken.trim() : null
}

def modrinthReleaseNotesFile = {
	def defaultNotesFile = "gradle/release-notes/${mod_version}.md"
	file(modrinthProperty('modrinth_changelog_file', defaultNotesFile))
}

def modrinthChangelogText = {
	def notesFile = modrinthReleaseNotesFile()
	if (!notesFile.isFile()) {
		throw new GradleException("Missing Modrinth release notes: ${notesFile}. Add gradle/release-notes/${mod_version}.md or pass -Pmodrinth_changelog_file=<path>.")
	}

	def notes = notesFile.getText('UTF-8').trim()
	if (notes.isBlank()) {
		throw new GradleException("Modrinth release notes file is blank: ${notesFile}")
	}
	return notes
}

def modrinthVersionNumberFor = { String profileId ->
	def suffixMode = modrinthProperty('modrinth_profile_version_suffix', 'auto')
	if (!['auto', 'always', 'never'].contains(suffixMode)) {
		throw new GradleException("modrinth_profile_version_suffix must be auto, always, or never.")
	}
	if (suffixMode == 'always' || (suffixMode == 'auto' && supportedMinecraftVersionProfiles.size() > 1)) {
		return "${mod_version}+mc${profileId}"
	}
	return mod_version.toString()
}

def modrinthUploadPlans = {
	def projectId = modrinthProperty('modrinth_project_id', '')
	if (projectId.isBlank()) {
		throw new GradleException('Missing modrinth_project_id; cannot prepare Modrinth upload.')
	}

	def versionType = modrinthProperty('modrinth_version_type', 'release')
	if (!['release', 'beta', 'alpha'].contains(versionType)) {
		throw new GradleException("modrinth_version_type must be release, beta, or alpha.")
	}

	def requestedStatus = modrinthProperty('modrinth_requested_status', 'listed')
	if (!['listed', 'archived', 'draft', 'unlisted', ''].contains(requestedStatus)) {
		throw new GradleException("modrinth_requested_status must be listed, archived, draft, unlisted, or blank.")
	}

	def fabricApiProjectId = modrinthProperty('modrinth_fabric_api_project_id', '')
	def includeFabricApiDependency = (findProperty('modrinth_include_fabric_api_dependency') ?: 'true').toString().toBoolean()
	def featured = (findProperty('modrinth_featured') ?: 'false').toString().toBoolean()
	def changelog = modrinthChangelogText()
	def plans = []

	supportedMinecraftVersionProfiles.each { profileName ->
		def profile = loadVersionProfile(profileName)
		def profileId = profileIdFor(profileName, profile)
		def gameVersions = profileGameVersionsFor(profile)
		def releaseJar = layout.buildDirectory
				.file("release/${profileId}/${project.base.archivesName.get()}-${version}.jar")
				.get()
				.asFile
		if (!releaseJar.isFile()) {
			throw new GradleException("Missing Modrinth upload jar: ${releaseJar}")
		}

		def dependencies = []
		if (includeFabricApiDependency && !fabricApiProjectId.isBlank()) {
			dependencies.add([
					project_id     : fabricApiProjectId,
					dependency_type: 'required'
			])
		}

		def versionNumber = modrinthVersionNumberFor(profileId)
		def data = [
				name          : "Quick Stack Nearby ${mod_version} for Minecraft ${profileId}",
				version_number: versionNumber,
				changelog     : changelog,
				dependencies  : dependencies,
				game_versions : gameVersions,
				version_type  : versionType,
				loaders       : ['fabric'],
				featured      : featured,
				project_id    : projectId,
				file_parts    : ['file'],
				primary_file  : 'file'
		]
		if (!requestedStatus.isBlank()) {
			data.requested_status = requestedStatus
		}

		plans.add([
				displayName : 'Quick Stack Nearby',
				profileId   : profileId,
				gameVersions: gameVersions,
				jar         : releaseJar,
				data        : data
		])
	}

	return plans
}

def writeModrinthUploadPlan = { List<Map> plans ->
	def planFile = layout.buildDirectory.file('modrinth/upload-plan.json').get().asFile
	planFile.parentFile.mkdirs()
	def notesFile = modrinthReleaseNotesFile()
	def printablePlans = plans.collect { plan ->
		[
				mod              : plan.displayName,
				profile_id       : plan.profileId,
				project_id       : plan.data.project_id,
				version_number   : plan.data.version_number,
				version_type     : plan.data.version_type,
				requested_status : plan.data.requested_status,
				release_notes    : notesFile.path,
				game_versions    : plan.gameVersions,
				loaders          : plan.data.loaders,
				jar              : plan.jar.absolutePath,
				dependency_count : plan.data.dependencies.size()
		]
	}
	planFile.text = groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(printablePlans))
	println "Wrote Modrinth upload plan: ${planFile}"
}

def printModrinthUploadPlan = { List<Map> plans ->
	plans.each { plan ->
		println "Modrinth plan: ${plan.displayName} ${plan.data.version_number} profile=${plan.profileId} project=${plan.data.project_id} games=${plan.gameVersions.join(',')} jar=${plan.jar.name}"
	}
}

def uploadModrinthPlan = { Map plan, String token ->
	def apiBaseUrl = modrinthProperty('modrinth_api_base_url', 'https://api.modrinth.com/v2').replaceAll('/+$', '')
	def userAgent = modrinthProperty('modrinth_user_agent', "TempestStudios/quick-stack-nearby/${mod_version}")
	def boundary = "----QuickStackNearbyModrinth${System.currentTimeMillis()}${Math.abs(new Random().nextInt())}"
	def connection = (java.net.HttpURLConnection) new URL("${apiBaseUrl}/version").openConnection()
	connection.setRequestMethod('POST')
	connection.setConnectTimeout(30000)
	connection.setReadTimeout(120000)
	connection.setDoOutput(true)
	connection.setRequestProperty('Authorization', token)
	connection.setRequestProperty('User-Agent', userAgent)
	connection.setRequestProperty('Content-Type', "multipart/form-data; boundary=${boundary}")

	connection.outputStream.withCloseable { output ->
		def writeText = { String text -> output.write(text.getBytes('UTF-8')) }
		writeText("--${boundary}\r\n")
		writeText('Content-Disposition: form-data; name="data"\r\n')
		writeText('Content-Type: application/json\r\n\r\n')
		writeText(groovy.json.JsonOutput.toJson(plan.data))
		writeText("\r\n")

		writeText("--${boundary}\r\n")
		writeText("Content-Disposition: form-data; name=\"file\"; filename=\"${plan.jar.name}\"\r\n")
		writeText('Content-Type: application/java-archive\r\n\r\n')
		plan.jar.withInputStream { input -> input.transferTo(output) }
		writeText("\r\n")
		writeText("--${boundary}--\r\n")
	}

	def statusCode = connection.responseCode
	def responseText = statusCode >= 200 && statusCode < 300
			? connection.inputStream.getText('UTF-8')
			: (connection.errorStream != null ? connection.errorStream.getText('UTF-8') : '')

	if (statusCode < 200 || statusCode >= 300) {
		throw new GradleException("Modrinth upload failed for ${plan.displayName} ${plan.data.version_number} (${statusCode}): ${responseText}")
	}

	def response = new groovy.json.JsonSlurper().parseText(responseText)
	println "Uploaded ${plan.displayName} ${plan.data.version_number} to Modrinth version ${response.id}"
}

tasks.register('prepareModrinthUploads') {
	group = 'publishing'
	description = 'Builds, smoke-tests, validates, and writes the Modrinth upload plan for supported profiles.'
	dependsOn tasks.named('publishValidation')

	doLast {
		def plans = modrinthUploadPlans()
		if (plans.isEmpty()) {
			throw new GradleException('No Modrinth uploads were prepared.')
		}
		writeModrinthUploadPlan(plans)
		printModrinthUploadPlan(plans)
	}
}

tasks.register('publishModrinthDryRun') {
	group = 'publishing'
	description = 'Runs the supported-profile publish gate and prints the Modrinth uploads without calling the API.'
	dependsOn tasks.named('prepareModrinthUploads')

	doLast {
		println 'Modrinth dry run complete. No API upload was performed.'
	}
}

tasks.register('publishModrinth') {
	group = 'publishing'
	description = 'Runs the supported-profile publish gate and uploads supported release jars to Modrinth.'
	dependsOn tasks.named('prepareModrinthUploads')

	doLast {
		if (!(findProperty('modrinth_confirm_publish') ?: 'false').toString().toBoolean()) {
			throw new GradleException('Real Modrinth publishing requires -Pmodrinth_confirm_publish=true. Use publishModrinthDryRun for a safe test.')
		}

		def token = modrinthToken()
		if (token == null) {
			throw new GradleException('Missing Modrinth token. Set MODRINTH_TOKEN or -Pmodrinth_token=... outside the repo.')
		}

		modrinthUploadPlans().each { uploadModrinthPlan(it, token) }
	}
}

