plugins {
	id 'net.fabricmc.fabric-loom-remap' apply false
	id 'net.fabricmc.fabric-loom' apply false
	id 'maven-publish'
}

def versionProfileName = providers.gradleProperty('minecraft_version_profile')
		.orElse(providers.gradleProperty('target_minecraft_version'))
		.orElse('1.21.11')
		.get()
def versionProfileFile = file("gradle/version-profiles/${versionProfileName}.properties")
if (!versionProfileFile.isFile()) {
	throw new GradleException("Unknown Minecraft version profile '${versionProfileName}'. Add ${versionProfileFile}.")
}
def versionProfile = new Properties()
versionProfileFile.withInputStream { versionProfile.load(it) }

[
		'minecraft_version',
		'loader_version',
		'loom_version',
		'fabric_api_version',
		'java_version'
].each { key ->
	if (!versionProfile.getProperty(key)) {
		throw new GradleException("Minecraft version profile '${versionProfileName}' is missing ${key}.")
	}
}

def profileProperty = { String key, String defaultValue ->
	def value = versionProfile.getProperty(key)
	return value != null && !value.isBlank() ? value.trim() : defaultValue
}
def listProperty = { String key, String defaultValue ->
	def value = findProperty(key)
	(value != null ? value : defaultValue)
			.toString()
			.split(',')
			.collect { it.trim() }
			.findAll { !it.isEmpty() }
}
def selectedMinecraftVersion = versionProfile.getProperty('minecraft_version').trim()

ext.minecraft_version_profile = versionProfileName
ext.minecraft_version_profile_id = profileProperty('profile_id', versionProfileName)
ext.minecraft_version = selectedMinecraftVersion
ext.loader_version = versionProfile.getProperty('loader_version').trim()
ext.loom_version = versionProfile.getProperty('loom_version').trim()
ext.fabric_api_version = versionProfile.getProperty('fabric_api_version').trim()
ext.target_java_version = versionProfile.getProperty('java_version') as int
ext.minecraft_dependency = profileProperty('minecraft_dependency', "~${selectedMinecraftVersion}")
ext.compat_group = profileProperty('compat_group', minecraft_version_profile_id)
ext.modrinth_game_versions = profileProperty('modrinth_game_versions', selectedMinecraftVersion)
		.split(',')
		.collect { it.trim() }
		.findAll { !it.isEmpty() }
ext.unobfuscated_minecraft = profileProperty('unobfuscated_minecraft', 'false').toBoolean()
ext.loom_plugin_id = unobfuscated_minecraft ? 'net.fabricmc.fabric-loom' : 'net.fabricmc.fabric-loom-remap'
ext.fabric_dependency_configuration = unobfuscated_minecraft ? 'implementation' : 'modImplementation'
ext.release_jar_task_name = unobfuscated_minecraft ? 'jar' : 'remapJar'

apply plugin: loom_plugin_id

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	// Loom adds the essential Fabric/Minecraft repositories automatically.
}

loom {
	splitEnvironmentSourceSets()

	mods {
		"quick-stack-nearby" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}
}

sourceSets {
	main {
		java {
			srcDir "src/compat/${compat_group}/main/java"
		}
		resources {
			srcDir "src/compat/${compat_group}/main/resources"
		}
	}
	client {
		java {
			srcDir "src/compat/${compat_group}/client/java"
		}
		resources {
			srcDir "src/compat/${compat_group}/client/resources"
		}
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${minecraft_version}"
	if (!unobfuscated_minecraft) {
		mappings loom.officialMojangMappings()
	}
	add(fabric_dependency_configuration, "net.fabricmc:fabric-loader:${loader_version}")
	add(fabric_dependency_configuration, "net.fabricmc.fabric-api:fabric-api:${fabric_api_version}")
}

processResources {
	def resourceProperties = [
			version: project.version,
			minecraft_version: minecraft_version,
			loader_version: loader_version,
			fabric_api_version: fabric_api_version,
			java_version: target_java_version,
			mixin_compatibility_level: "JAVA_${target_java_version}",
			minecraft_dependency: minecraft_dependency,
			minecraft_version_profile_id: minecraft_version_profile_id,
			compat_group: compat_group,
			modrinth_game_versions: modrinth_game_versions.join(',')
	]

	inputs.properties(resourceProperties)

	filesMatching("fabric.mod.json") {
		expand(resourceProperties)
	}
	filesMatching("*.mixins.json") {
		expand(resourceProperties)
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = target_java_version
}

tasks.withType(JavaExec).configureEach {
	javaLauncher = javaToolchains.launcherFor {
		languageVersion = JavaLanguageVersion.of(target_java_version)
	}
	jvmArgs('-Xmx2G')
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(target_java_version)
	}
	withSourcesJar()
	sourceCompatibility = JavaVersion.toVersion(target_java_version)
	targetCompatibility = JavaVersion.toVersion(target_java_version)
}

jar {
	inputs.property "archivesName", project.base.archivesName

	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}" }
	}
	from("LICENSE-GPL-3.0") {
		rename { "${it}_${inputs.properties.archivesName}" }
	}
}

def supportedMinecraftVersionProfiles = listProperty(
		'supported_minecraft_version_profiles',
		minecraft_version_profile
)
def candidateMinecraftVersionProfiles = listProperty(
		'candidate_minecraft_version_profiles',
		''
)
def validationMinecraftVersionProfiles = (supportedMinecraftVersionProfiles + candidateMinecraftVersionProfiles).unique()
def smokeTestRequiredMinecraftVersionProfiles = listProperty(
		'smoke_test_required_minecraft_version_profiles',
		supportedMinecraftVersionProfiles.join(',')
)
def releaseOutputDirectory = layout.buildDirectory.dir("release/${minecraft_version_profile_id}")
def releaseJarTaskProvider = tasks.named(release_jar_task_name)
def releaseJarFile = releaseJarTaskProvider.flatMap { it.archiveFile }
def gradleWrapperExecutable = System.getProperty('os.name').toLowerCase(Locale.ROOT).contains('windows')
		? 'gradlew.bat'
		: './gradlew'
def useSmokeTestXvfb = (findProperty('quickstacknearby_smoke_xvfb') ?: 'false').toString().toBoolean()
def useSmokeTestNestedNoDaemon = (findProperty('quickstacknearby_smoke_nested_no_daemon') ?: 'true').toString().toBoolean()
def selectedSmokeProfileFilters = listProperty('quickstacknearby_smoke_profiles', '') as Set
def selectedSmokeGameVersionFilters = listProperty('quickstacknearby_smoke_game_versions', '') as Set
def selectedSmokeInstallSetFilters = listProperty('quickstacknearby_smoke_install_sets', '') as Set

def loadVersionProfile = { String profileName ->
	def profileFile = file("gradle/version-profiles/${profileName}.properties")
	if (!profileFile.isFile()) {
		throw new GradleException("Unknown Minecraft version profile '${profileName}'. Add ${profileFile}.")
	}
	def profile = new Properties()
	profileFile.withInputStream { profile.load(it) }
	return profile
}

def profileIdFor = { String profileName, Properties profile ->
	def value = profile.getProperty('profile_id')
	return value != null && !value.isBlank() ? value.trim() : profileName
}

def profileGameVersionsFor = { Properties profile ->
	def selectedVersion = profile.getProperty('minecraft_version')
	def value = profile.getProperty('modrinth_game_versions') ?: selectedVersion
	return value.toString()
			.split(',')
			.collect { it.trim() }
			.findAll { !it.isEmpty() }
}

def safeTaskSuffix = { String value ->
	value.replaceAll(/[^A-Za-z0-9]/, '_')
}

def profileBuildTaskName = { String taskPrefix, String profile ->
	"${taskPrefix}${safeTaskSuffix(profile)}"
}

def registerProfileBuildTasks = { List<String> profiles, String taskPrefix, String taskGroup, String descriptionPrefix ->
	def previousTask = null
	profiles.collect { profile ->
		def taskName = profileBuildTaskName(taskPrefix, profile)
		def taskProvider = tasks.register(taskName, Exec) {
			group = taskGroup
			description = "${descriptionPrefix} ${profile}."
			commandLine gradleWrapperExecutable,
					'buildRelease',
					"-Pminecraft_version_profile=${profile}",
					'--no-daemon',
					'--console=plain'
		}
		if (previousTask != null) {
			def predecessor = previousTask
			taskProvider.configure {
				mustRunAfter predecessor
			}
		}
		previousTask = taskProvider
		return taskProvider
	}
}

def supportedProfileBuildTasks = registerProfileBuildTasks(
		supportedMinecraftVersionProfiles,
		'buildMinecraft',
		'build',
		'Builds and verifies the release jar for supported Minecraft version profile'
)

def validationProfileBuildTasks = registerProfileBuildTasks(
		validationMinecraftVersionProfiles,
		'validateMinecraft',
		'verification',
		'Builds and verifies the release jar for validation Minecraft version profile'
)

tasks.register('collectReleaseJar', Copy) {
	group = 'build'
	description = 'Collects the active profile release jar into build/release/<profile_id>.'
	dependsOn releaseJarTaskProvider

	from(releaseJarFile)
	into releaseOutputDirectory

	doFirst {
		delete releaseOutputDirectory
	}
}

tasks.register('verifyReleaseMetadata') {
	group = 'verification'
	description = 'Verifies the active profile release jar metadata and required assets.'
	dependsOn tasks.named('collectReleaseJar')

	doLast {
		def releaseJarName = releaseJarFile.get().asFile.name
		def releaseJar = releaseOutputDirectory.get().file(releaseJarName).asFile
		if (!releaseJar.isFile()) {
			throw new GradleException("Missing release jar: ${releaseJar}")
		}
		if (modrinth_game_versions.isEmpty()) {
			throw new GradleException("Profile ${minecraft_version_profile} has no modrinth_game_versions.")
		}

		def entries = [] as Set
		def readEntryText = { java.util.zip.ZipFile zip, String entryName ->
			def entry = zip.getEntry(entryName)
			if (entry == null) {
				throw new GradleException("${releaseJar.name} is missing ${entryName}")
			}
			zip.getInputStream(entry).withCloseable { stream ->
				return stream.getText('UTF-8')
			}
		}

		def fabricJsonText
		new java.util.zip.ZipFile(releaseJar).withCloseable { zip ->
			def entryEnumeration = zip.entries()
			while (entryEnumeration.hasMoreElements()) {
				entries.add(entryEnumeration.nextElement().name)
			}
			fabricJsonText = readEntryText(zip, 'fabric.mod.json')
		}

		if (fabricJsonText.contains('${')) {
			throw new GradleException("${releaseJar.name} contains unexpanded resource placeholders.")
		}

		def fabricMetadata = new groovy.json.JsonSlurper().parseText(fabricJsonText)
		def expectedJavaDependency = ">=${target_java_version}"
		def expectedLicense = 'LGPL-3.0-or-later'
		def expectedBundledLicenses = [
				"LICENSE_${project.base.archivesName.get()}".toString(),
				"LICENSE-GPL-3.0_${project.base.archivesName.get()}".toString()
		]

		if (fabricMetadata.id != 'quick-stack-nearby') {
			throw new GradleException("${releaseJar.name} declares mod id ${fabricMetadata.id}, expected quick-stack-nearby.")
		}
		if (fabricMetadata.version != project.version.toString()) {
			throw new GradleException("${releaseJar.name} declares version ${fabricMetadata.version}, expected ${project.version}.")
		}
		if (fabricMetadata.license != expectedLicense) {
			throw new GradleException("${releaseJar.name} declares license ${fabricMetadata.license}, expected ${expectedLicense}.")
		}
		if (fabricMetadata.environment != '*') {
			throw new GradleException("${releaseJar.name} declares environment ${fabricMetadata.environment}, expected *.")
		}
		if (!(fabricMetadata.entrypoints?.main ?: []).contains('tempeststudios.quickstacknearby.QuickStackNearby')) {
			throw new GradleException("${releaseJar.name} is missing the common Quick Stack Nearby entrypoint.")
		}
		if (!(fabricMetadata.entrypoints?.client ?: []).contains('tempeststudios.quickstacknearby.QuickStackNearbyClient')) {
			throw new GradleException("${releaseJar.name} is missing the client Quick Stack Nearby entrypoint.")
		}
		if (fabricMetadata.depends.fabricloader != ">=${loader_version}") {
			throw new GradleException("${releaseJar.name} declares Fabric Loader dependency ${fabricMetadata.depends.fabricloader}, expected >=${loader_version}.")
		}
		if (fabricMetadata.depends.minecraft != minecraft_dependency) {
			throw new GradleException("${releaseJar.name} declares Minecraft dependency ${fabricMetadata.depends.minecraft}, expected ${minecraft_dependency}.")
		}
		if (fabricMetadata.depends.java != expectedJavaDependency) {
			throw new GradleException("${releaseJar.name} declares Java dependency ${fabricMetadata.depends.java}, expected ${expectedJavaDependency}.")
		}
		if (fabricMetadata.depends['fabric-api'] != '*') {
			throw new GradleException("${releaseJar.name} declares Fabric API dependency ${fabricMetadata.depends['fabric-api']}, expected *.")
		}
		if (!fabricMetadata.icon || !entries.contains(fabricMetadata.icon.toString())) {
			throw new GradleException("${releaseJar.name} declares missing icon ${fabricMetadata.icon}.")
		}
		expectedBundledLicenses.each { licenseEntry ->
			if (!entries.contains(licenseEntry)) {
				throw new GradleException("${releaseJar.name} is missing bundled license ${licenseEntry}.")
			}
		}

		println "Verified release metadata: ${releaseJar}"
		println "  License: ${expectedLicense}"
		println "  Minecraft dependency: ${minecraft_dependency}"
		println "  Java dependency: ${expectedJavaDependency}"
		println "  Modrinth game versions: ${modrinth_game_versions.join(', ')}"
	}
}

tasks.register('buildRelease') {
	group = 'build'
	description = 'Builds, collects, and verifies the active Minecraft version profile release jar.'
	dependsOn tasks.named('build')
	dependsOn tasks.named('verifyReleaseMetadata')
}

tasks.register('buildAllMods') {
	group = 'build'
	description = 'Builds the active Quick Stack Nearby release jar. Kept for InventorySort-compatible workflow commands.'
	dependsOn tasks.named('buildRelease')
}

