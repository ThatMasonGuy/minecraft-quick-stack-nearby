name: candidate smoke validation

on:
  workflow_dispatch:
    inputs:
      smoke_profiles:
        description: 'Optional comma-separated release profile filter'
        required: false
        type: string
        default: ''
      smoke_game_versions:
        description: 'Optional comma-separated exact Minecraft version filter'
        required: false
        type: string
        default: ''
      smoke_install_sets:
        description: 'Optional comma-separated install set filter'
        required: false
        type: string
        default: ''

jobs:
  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk 21 toolchain
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: setup jdk 17 toolchain
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: setup jdk 25 toolchain
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: select gradle jdk 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: print java runtime
        run: java -version
      - name: install virtual display
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: smoke validation
        env:
          SMOKE_PROFILES: ${{ inputs.smoke_profiles }}
          SMOKE_GAME_VERSIONS: ${{ inputs.smoke_game_versions }}
          SMOKE_INSTALL_SETS: ${{ inputs.smoke_install_sets }}
        run: |
          set -euo pipefail
          if [ -n "$SMOKE_PROFILES" ] || [ -n "$SMOKE_GAME_VERSIONS" ] || [ -n "$SMOKE_INSTALL_SETS" ]; then
            args=(smokeTestSelected -Pquickstacknearby_smoke_xvfb=true)
            if [ -n "$SMOKE_PROFILES" ]; then
              args+=("-Pquickstacknearby_smoke_profiles=$SMOKE_PROFILES")
            fi
            if [ -n "$SMOKE_GAME_VERSIONS" ]; then
              args+=("-Pquickstacknearby_smoke_game_versions=$SMOKE_GAME_VERSIONS")
            fi
            if [ -n "$SMOKE_INSTALL_SETS" ]; then
              args+=("-Pquickstacknearby_smoke_install_sets=$SMOKE_INSTALL_SETS")
            fi
          else
            args=(smokeTestValidation -Pquickstacknearby_smoke_xvfb=true)
          fi
          ./gradlew "${args[@]}" --no-daemon --console=plain
      - name: capture smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Candidate Smoke Artifacts
          path: |
            build/release/
            build/smoke-logs/
            build/smoke-mod-lists/
            build/smoke-run/
            build/reports/
            modules/*/build/reports/
