# Automatically run a fast default-profile build for every push and submitted
# pull request. The expensive multi-version smoke matrix runs in the manual
# Modrinth publish workflow before upload.

name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: fast default-profile build
        run: ./gradlew buildAllMods --no-daemon --console=plain
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/release/
